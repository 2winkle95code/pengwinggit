<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline';
             font-src 'self'; img-src 'self' data:;">
  <title>Octogit</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Custom title bar -->
  <header id="titlebar">
    <div class="titlebar-drag">
      <svg class="logo" width="20" height="20" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="3" fill="none"
          stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="18" r="3" fill="none"
          stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" fill="none"
          stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="11" x2="6" y2="15"
          stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="11" x2="18" y2="15"
          stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="titlebar-title">Octogit</span>
      <span class="titlebar-repo" id="repoName"></span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btnMin" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect y="5" width="12" height="2" fill="currentColor"/>
        </svg>
      </button>
      <button class="tb-btn" id="btnMax" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect x="1" y="1" width="10" height="10" fill="none"
            stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
      <button class="tb-btn tb-close" id="btnClose" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <line x1="1" y1="1" x2="11" y2="11"
            stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="1" x2="1" y2="11"
            stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <nav id="toolbar">
    <button class="tool-btn" id="btnOpenRepo" title="Open Repository">
      <svg width="16" height="16" viewBox="0 0 16 16">
        <path d="M1 3h5l2 2h7v9H1V3z" fill="none"
          stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span>Open</span>
    </button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="btnRefresh" title="Refresh">
      <svg width="16" height="16" viewBox="0 0 16 16">
        <path d="M13.5 8a5.5 5.5 0 1 1-1.5-3.8"
          fill="none" stroke="currentColor" stroke-width="1.3"/>
        <polyline points="12 1 13.5 4.2 10.2 4.2"
          fill="none" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span>Refresh</span>
    </button>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-search">
      <svg width="14" height="14" viewBox="0 0 16 16">
        <circle cx="7" cy="7" r="5" fill="none"
          stroke="currentColor" stroke-width="1.3"/>
        <line x1="11" y1="11" x2="15" y2="15"
          stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <input type="text" id="searchInput"
        placeholder="Search commits...">
    </div>
  </nav>

  <!-- Main layout -->
  <div id="app">
    <!-- Left sidebar: branches, tags, remotes -->
    <aside id="sidebar">
      <div class="sidebar-section" id="branchSection">
        <div class="section-header" data-toggle="branches">
          <svg width="12" height="12" viewBox="0 0 16 16"
            class="section-icon">
            <line x1="6" y1="2" x2="6" y2="14"
              stroke="currentColor" stroke-width="1.5"/>
            <circle cx="6" cy="4" r="2" fill="currentColor"/>
            <circle cx="6" cy="12" r="2" fill="currentColor"/>
            <path d="M6 8c0-3 4-3 4-6" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
            <circle cx="10" cy="4" r="2" fill="currentColor"/>
          </svg>
          <span>Branches</span>
          <svg class="chevron" width="10" height="10"
            viewBox="0 0 10 10">
            <polyline points="2,3 5,7 8,3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="section-body" id="branchList"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-header" data-toggle="remotes">
          <svg width="12" height="12" viewBox="0 0 16 16"
            class="section-icon">
            <circle cx="8" cy="8" r="6" fill="none"
              stroke="currentColor" stroke-width="1.3"/>
            <ellipse cx="8" cy="8" rx="3" ry="6" fill="none"
              stroke="currentColor" stroke-width="1.3"/>
            <line x1="2" y1="8" x2="14" y2="8"
              stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span>Remotes</span>
          <svg class="chevron" width="10" height="10"
            viewBox="0 0 10 10">
            <polyline points="2,3 5,7 8,3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="section-body" id="remoteList"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-header" data-toggle="tags">
          <svg width="12" height="12" viewBox="0 0 16 16"
            class="section-icon">
            <path d="M2 2h6l6 6-6 6-6-6V2z" fill="none"
              stroke="currentColor" stroke-width="1.3"/>
            <circle cx="5.5" cy="5.5" r="1.2"
              fill="currentColor"/>
          </svg>
          <span>Tags</span>
          <svg class="chevron" width="10" height="10"
            viewBox="0 0 10 10">
            <polyline points="2,3 5,7 8,3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="section-body" id="tagList"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-header" data-toggle="stashes">
          <svg width="12" height="12" viewBox="0 0 16 16"
            class="section-icon">
            <rect x="2" y="2" width="12" height="3" rx="1"
              fill="none" stroke="currentColor"
              stroke-width="1.3"/>
            <rect x="2" y="7" width="12" height="3" rx="1"
              fill="none" stroke="currentColor"
              stroke-width="1.3"/>
            <rect x="2" y="12" width="12" height="3" rx="1"
              fill="none" stroke="currentColor"
              stroke-width="1.3"/>
          </svg>
          <span>Stashes</span>
          <svg class="chevron" width="10" height="10"
            viewBox="0 0 10 10">
            <polyline points="2,3 5,7 8,3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="section-body" id="stashList"></div>
      </div>
    </aside>

    <!-- Center: commit graph + list -->
    <main id="center">
      <!-- Welcome screen -->
      <div id="welcome" class="center-panel">
        <div class="welcome-content">
          <svg width="80" height="80" viewBox="0 0 24 24"
            class="welcome-logo">
            <circle cx="12" cy="8" r="3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
            <circle cx="6" cy="18" r="3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
            <circle cx="18" cy="18" r="3" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
            <line x1="12" y1="11" x2="6" y2="15"
              stroke="currentColor" stroke-width="1.5"/>
            <line x1="12" y1="11" x2="18" y2="15"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <h1>Octogit</h1>
          <p>Open a repository to get started</p>
          <button class="primary-btn" id="btnWelcomeOpen">
            Open Repository
          </button>
        </div>
      </div>

      <!-- Commit graph view -->
      <div id="graphView" class="center-panel" hidden>
        <div id="commitTable">
          <div class="commit-table-header">
            <div class="ct-graph">Graph</div>
            <div class="ct-desc">Description</div>
            <div class="ct-author">Author</div>
            <div class="ct-date">Date</div>
            <div class="ct-hash">SHA</div>
          </div>
          <div id="commitListContainer">
            <canvas id="graphCanvas"></canvas>
            <div id="commitList"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Right panel: commit detail -->
    <aside id="detailPanel" hidden>
      <div class="detail-header">
        <h3>Commit Detail</h3>
        <button class="icon-btn" id="btnCloseDetail"
          title="Close">
          <svg width="14" height="14" viewBox="0 0 12 12">
            <line x1="1" y1="1" x2="11" y2="11"
              stroke="currentColor" stroke-width="1.5"/>
            <line x1="11" y1="1" x2="1" y2="11"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
      <div id="detailContent">
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-message" id="detailMessage"></div>
        <div class="detail-files-header">
          <span>Changed Files</span>
          <span class="file-count" id="fileCount"></span>
        </div>
        <div class="detail-files" id="detailFiles"></div>
        <div class="detail-diff" id="detailDiff"></div>
      </div>
    </aside>
  </div>

  <script src="components/app.js"></script>
</body>
</html>
